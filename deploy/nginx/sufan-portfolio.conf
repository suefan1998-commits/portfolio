server {
    listen 80;
    listen [::]:80;

    # Keep the IP entry as a temporary smoke-test route. The formal public
    # entry should use the domain names over HTTPS.
    server_name 49.233.72.236;

    root /var/www/sufan-portfolio;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|svg|ico|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name sufan-freelancewriter.com.cn www.sufan-freelancewriter.com.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sufan-freelancewriter.com.cn www.sufan-freelancewriter.com.cn;

    root /var/www/sufan-portfolio;
    index index.html;

    ssl_certificate /etc/nginx/ssl/sufan-freelancewriter.com.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/sufan-freelancewriter.com.cn.key;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|svg|ico|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}
