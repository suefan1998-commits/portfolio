server {
    listen 80;
    listen [::]:80;

    # The IP entry is only for pre-ICP smoke testing. After ICP and HTTPS are
    # ready, keep the domain names here and redirect HTTP traffic to HTTPS.
    server_name 49.233.72.236 www.sufan-freelancewriter.com.cn sufan-freelancewriter.com.cn;

    root /var/www/sufan-portfolio;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|svg|ico|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}
